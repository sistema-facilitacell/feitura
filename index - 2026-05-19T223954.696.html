<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Feitura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0800; }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      47% { opacity: 1; } 48% { opacity: 0.85; } 49% { opacity: 1; }
      62% { opacity: 1; } 63% { opacity: 0.9; } 64% { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(200,134,10,0.3); }
      50% { box-shadow: 0 0 22px rgba(200,134,10,0.7), 0 0 40px rgba(200,134,10,0.2); }
    }
    @keyframes smoke {
      0% { opacity: 0.5; transform: translateY(0) scaleX(1); }
      100% { opacity: 0; transform: translateY(-40px) scaleX(1.5); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    select option { background: #1a0d00; color: #e8d5b0; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(200,134,10,0.3); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Firebase SDK (compat via CDN — não precisa de build) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // ─── SUAS CHAVES DO FIREBASE ─────────────────────────────────────────────────
    // Substitua pelos seus valores do Console do Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyB59Ruh_m9BH3s1d_-CaBLV_4WR1-dmNkM",
      authDomain: "feitura-eaf3d.firebaseapp.com",
      projectId: "feitura-eaf3d",
      storageBucket: "feitura-eaf3d.firebasestorage.app",
      messagingSenderId: "376425355963",
      appId: "1:376425355963:web:af9fd2457babbb1dab279e",
    };
    // ─────────────────────────────────────────────────────────────────────────────

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const itemsRef = db.collection("feitura_items");

    // ─── Dados ──────────────────────────────────────────────────────────────────
    const categorias = [
      { nome: "Oferendas", icone: "🌹" },
      { nome: "Roupas e Tecidos", icone: "🪡" },
      { nome: "Velas e Incensos", icone: "🕯️" },
      { nome: "Ervas e Natureza", icone: "🌿" },
      { nome: "Alimentos", icone: "🍯" },
      { nome: "Ferramentas", icone: "⚒️" },
      { nome: "Outros", icone: "✦" },
    ];

    const orixas = [
      { nome: "Oxalá",      icone: "🤍", cor: "#e8e8e8" },
      { nome: "Ogum",       icone: "⚔️",  cor: "#4a7cbf" },
      { nome: "Oxóssi",     icone: "🏹", cor: "#2e7d32" },
      { nome: "Xangô",      icone: "⚡",  cor: "#c0392b" },
      { nome: "Omolu",      icone: "💀", cor: "#5d4037" },
      { nome: "Iemanjá",    icone: "🌊", cor: "#1565c0" },
      { nome: "Oxum",       icone: "💛", cor: "#f9a825" },
      { nome: "Iansã",      icone: "🌪️", cor: "#c62828" },
      { nome: "Nanã",       icone: "🪻", cor: "#6a1b9a" },
      { nome: "Erês",       icone: "🎀", cor: "#e91e8c" },
      { nome: "Exu",        icone: "🔱", cor: "#212121" },
      { nome: "Pomba Gira", icone: "🌹", cor: "#ad1457" },
      { nome: "Ciganos",    icone: "🔮", cor: "#6a1b9a" },
      { nome: "Malandro",   icone: "🎩", cor: "#1b5e20" },
    ];

    // ─── Estado global ──────────────────────────────────────────────────────────
    let state = {
      items: [],
      loaded: false,
      nome: "",
      categoria: "Velas e Incensos",
      orixa: "",
      prioridade: "normal",
      quantidade: 1,
      preco: "",
      filtro: "todos",
      filtroOrixa: "",
      filtroNome: "",
      showForm: false,
      confirmDelete: null,
      showComprados: false,
      expandedId: null,
      toast: null,
    };
    let toastTimer = null;
    let unsubscribe = null;

    function setState(patch) {
      state = { ...state, ...patch };
      render();
    }

    // ─── Firebase ───────────────────────────────────────────────────────────────
    function startListener() {
      unsubscribe = itemsRef.orderBy("criadoEm", "desc").onSnapshot(
        (snapshot) => {
          const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          setState({ items, loaded: true });
        },
        (err) => {
          console.error(err);
          setState({ loaded: true });
        }
      );
    }

    async function addItem() {
      if (!state.nome.trim()) return;
      const novo = {
        nome: state.nome.trim(),
        categoria: state.categoria,
        orixa: state.orixa || "",
        prioridade: state.prioridade,
        quantidade: Number(state.quantidade) || 1,
        preco: state.preco ? parseFloat(state.preco.replace(",", ".")) : null,
        comprado: false,
        quantidadeComprada: 0,
        criadoEm: Date.now(),
        criadoEmLabel: new Date().toLocaleDateString("pt-BR"),
      };
      try {
        await itemsRef.add(novo);
        setState({ nome: "", categoria: "Velas e Incensos", orixa: "", prioridade: "normal", quantidade: 1, preco: "", showForm: false });
        showToast("Item adicionado com axé ✦");
      } catch (e) { showToast("Erro ao salvar :(", "info"); }
    }

    async function toggleComprado(id, compradoAtual, qtd) {
      const novoComprado = !compradoAtual;
      try {
        await db.collection("feitura_items").doc(id).update({
          comprado: novoComprado,
          quantidadeComprada: novoComprado ? qtd : 0,
        });
      } catch (e) { showToast("Erro ao atualizar :(", "info"); }
    }

    async function updateQtdComprada(id, val, qtdTotal) {
      const qtd = Math.max(0, Math.min(qtdTotal, Number(val)));
      try {
        await db.collection("feitura_items").doc(id).update({
          quantidadeComprada: qtd,
          comprado: qtd >= qtdTotal,
        });
      } catch (e) { showToast("Erro ao atualizar :(", "info"); }
    }

    async function removeItem(id) {
      try {
        await db.collection("feitura_items").doc(id).delete();
        setState({ confirmDelete: null });
        showToast("Item removido", "info");
      } catch (e) { showToast("Erro ao remover :(", "info"); }
    }

    function showToast(msg, type = "success") {
      clearTimeout(toastTimer);
      setState({ toast: { msg, type } });
      toastTimer = setTimeout(() => setState({ toast: null }), 2400);
    }

    function catIcone(nome) {
      return categorias.find(c => c.nome === nome)?.icone || "✦";
    }

    // ─── HTML helpers ────────────────────────────────────────────────────────────
    function h(tag, attrs, ...children) {
      const el = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs || {})) {
        if (k === "style" && typeof v === "object") Object.assign(el.style, v);
        else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === "htmlFor") el.setAttribute("for", v);
        else if (k === "className") el.className = v;
        else if (k === "checked") el.checked = v;
        else el.setAttribute(k, v);
      }
      for (const child of children.flat()) {
        if (child == null || child === false) continue;
        el.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
      }
      return el;
    }

    function svg(width, height, viewBox, fill, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      el.setAttribute("width", width); el.setAttribute("height", height);
      el.setAttribute("viewBox", viewBox); el.setAttribute("fill", fill);
      el.innerHTML = children;
      return el;
    }

    // ─── Componentes ────────────────────────────────────────────────────────────
    function Candle(opacity = 0.8) {
      const wrap = h("div", { style: { position: "relative", display: "inline-block", opacity } });
      const smoke = h("div", { style: { position: "absolute", top: "-18px", left: "50%", transform: "translateX(-50%)", width: "3px", height: "16px", background: "rgba(255,255,255,0.15)", borderRadius: "4px", animation: "smoke 2s ease-out infinite" } });
      const flame = h("div", { style: { position: "absolute", top: "-14px", left: "50%", transform: "translateX(-50%)", width: "8px", height: "12px", background: "radial-gradient(ellipse at 50% 80%, #f0c040 0%, #e07010 50%, #c03010 100%)", borderRadius: "50% 50% 30% 30%", animation: "flicker 3s ease-in-out infinite", boxShadow: "0 0 8px rgba(240,192,64,0.8), 0 0 16px rgba(240,192,64,0.4)" } });
      const body = h("div", { style: { width: "14px", height: "48px", borderRadius: "2px 2px 0 0", background: "linear-gradient(180deg, #f5f0e0 0%, #e8ddb0 50%, #d4c880 100%)", boxShadow: "inset -3px 0 6px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.4)" } });
      const base = h("div", { style: { width: "18px", height: "4px", borderRadius: "0 0 4px 4px", marginLeft: "-2px", background: "linear-gradient(90deg, #b8a050, #d4c060, #b8a050)" } });
      wrap.append(smoke, flame, body, base);
      return wrap;
    }

    function StarSymbol(size = 16, color = "#c8860a", animated = false) {
      const el = svg(size, size, "0 0 24 24", color, `<path d="M12 2 L13.5 9 L20 8 L14.5 13 L17 20 L12 16 L7 20 L9.5 13 L4 8 L10.5 9 Z"/>`);
      if (animated) el.style.animation = "spin-slow 12s linear infinite";
      return el;
    }

    function renderItemCard(item, idx, isComprado = false) {
      const progresso = item.quantidade > 0 ? (item.quantidadeComprada / item.quantidade) * 100 : 0;
      const isExpanded = state.expandedId === item.id;

      const card = h("div", {
        style: {
          background: isComprado ? "rgba(39,174,96,0.04)" : item.prioridade === "alta" ? "rgba(192,57,43,0.06)" : "rgba(255,255,255,0.04)",
          border: isComprado ? "1px solid rgba(39,174,96,0.2)" : item.prioridade === "alta" ? "1px solid rgba(192,57,43,0.35)" : "1px solid rgba(200,134,10,0.15)",
          borderRadius: "16px", padding: "14px 16px",
          opacity: isComprado ? "0.7" : "1",
          animation: `rise 0.4s ease ${idx * 0.06}s both`,
          transition: "all 0.2s",
          marginBottom: "0",
        }
      });

      // Row
      const row = h("div", { style: { display: "flex", alignItems: "center", gap: "12px" } });

      // Checkbox
      const checkBtn = document.createElement("button");
      Object.assign(checkBtn.style, {
        width: "28px", height: "28px", borderRadius: "50%", border: "none", cursor: "pointer",
        flexShrink: "0", fontSize: "13px", display: "flex", alignItems: "center", justifyContent: "center",
        background: item.comprado ? "linear-gradient(135deg, #27ae60, #1e8449)" : "rgba(255,255,255,0.07)",
        color: item.comprado ? "#fff" : "#a07840",
        transition: "all 0.25s",
        boxShadow: item.comprado ? "0 2px 10px rgba(39,174,96,0.4)" : "none",
      });
      checkBtn.textContent = item.comprado ? "✓" : "○";
      checkBtn.addEventListener("click", () => toggleComprado(item.id, item.comprado, item.quantidade));

      // Info
      const info = h("div", { style: { flex: "1", minWidth: "0" } });
      const nameEl = h("div", {
        style: {
          fontSize: "15px", fontWeight: "600",
          color: item.comprado ? "#7a5820" : "#e8d5b0",
          textDecoration: item.comprado ? "line-through" : "none",
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", letterSpacing: "0.5px",
        }
      }, item.nome);

      const tags = h("div", { style: { display: "flex", gap: "6px", marginTop: "5px", flexWrap: "wrap", alignItems: "center" } });
      const orixaInfo = item.orixa ? orixas.find(o => o.nome === item.orixa) : null;
      tags.append(
        h("span", { style: { fontSize: "10px", padding: "2px 9px", borderRadius: "10px", background: "rgba(200,134,10,0.12)", color: "#c8860a", letterSpacing: "0.5px" } }, `${catIcone(item.categoria)} ${item.categoria}`),
        ...(orixaInfo ? [h("span", { style: { fontSize: "10px", padding: "2px 9px", borderRadius: "10px", background: `${orixaInfo.cor}22`, color: orixaInfo.cor, letterSpacing: "0.5px", border: `1px solid ${orixaInfo.cor}44` } }, `${orixaInfo.icone} ${orixaInfo.nome}`)] : []),
        ...(item.prioridade === "alta" ? [h("span", { style: { fontSize: "10px", padding: "2px 9px", borderRadius: "10px", background: "rgba(192,57,43,0.2)", color: "#e74c3c", letterSpacing: "0.5px" } }, "🔥 PRIORITÁRIO")] : []),
        h("span", { style: { fontSize: "10px", color: "#7a5820" } }, `${item.quantidadeComprada}/${item.quantidade} un.${item.preco ? ` · R$ ${(item.preco * item.quantidade).toFixed(2).replace(".", ",")}` : ""}`)
      );

      info.append(nameEl, tags);

      if (item.quantidade > 1) {
        const barWrap = h("div", { style: { marginTop: "7px", height: "3px", borderRadius: "2px", background: "rgba(255,255,255,0.08)", overflow: "hidden" } });
        const barFill = h("div", { style: { height: "100%", borderRadius: "2px", width: `${progresso}%`, background: progresso >= 100 ? "linear-gradient(90deg, #27ae60, #2ecc71)" : "linear-gradient(90deg, #c8860a, #f0c040)", transition: "width 0.4s ease" } });
        barWrap.append(barFill);
        info.append(barWrap);
      }

      // Actions
      const actions = h("div", { style: { display: "flex", flexDirection: "column", gap: "4px", alignItems: "flex-end" } });

      if (state.confirmDelete === item.id) {
        const confirmRow = h("div", { style: { display: "flex", gap: "4px" } });
        const simBtn = document.createElement("button");
        Object.assign(simBtn.style, { padding: "4px 10px", background: "#c0392b", color: "#fff", border: "none", borderRadius: "8px", cursor: "pointer", fontSize: "11px", fontFamily: "'Cormorant Garamond', serif" });
        simBtn.textContent = "Sim";
        simBtn.addEventListener("click", () => removeItem(item.id));
        const naoBtn = document.createElement("button");
        Object.assign(naoBtn.style, { padding: "4px 10px", background: "rgba(255,255,255,0.08)", color: "#e8d5b0", border: "none", borderRadius: "8px", cursor: "pointer", fontSize: "11px", fontFamily: "'Cormorant Garamond', serif" });
        naoBtn.textContent = "Não";
        naoBtn.addEventListener("click", () => setState({ confirmDelete: null }));
        confirmRow.append(simBtn, naoBtn);
        actions.append(confirmRow);
      } else {
        const btnRow = h("div", { style: { display: "flex", gap: "6px", alignItems: "center" } });
        if (!item.comprado && item.quantidade > 1) {
          const expandBtn = document.createElement("button");
          Object.assign(expandBtn.style, { background: "none", border: "none", color: "#a07840", cursor: "pointer", fontSize: "14px", padding: "4px" });
          expandBtn.textContent = "⊕";
          expandBtn.addEventListener("click", () => setState({ expandedId: isExpanded ? null : item.id }));
          btnRow.append(expandBtn);
        }
        const deleteBtn = document.createElement("button");
        Object.assign(deleteBtn.style, { background: "none", border: "none", color: "#7a5820", cursor: "pointer", fontSize: "16px", padding: "4px" });
        deleteBtn.textContent = "🗑";
        deleteBtn.addEventListener("click", () => setState({ confirmDelete: item.id }));
        btnRow.append(deleteBtn);
        actions.append(btnRow);
      }

      row.append(checkBtn, info, actions);
      card.append(row);

      // Expanded qty controls
      if (isExpanded && !item.comprado && item.quantidade > 1) {
        const expRow = h("div", { style: { marginTop: "10px", paddingTop: "10px", borderTop: "1px solid rgba(200,134,10,0.12)", display: "flex", alignItems: "center", gap: "10px", animation: "rise 0.2s ease" } });
        const minusBtn = document.createElement("button");
        Object.assign(minusBtn.style, { width: "24px", height: "24px", borderRadius: "50%", border: "none", cursor: "pointer", background: "rgba(200,134,10,0.15)", color: "#c8860a", fontSize: "14px" });
        minusBtn.textContent = "−";
        minusBtn.addEventListener("click", () => updateQtdComprada(item.id, item.quantidadeComprada - 1, item.quantidade));
        const plusBtn = document.createElement("button");
        Object.assign(plusBtn.style, { width: "24px", height: "24px", borderRadius: "50%", border: "none", cursor: "pointer", background: "rgba(200,134,10,0.15)", color: "#c8860a", fontSize: "14px" });
        plusBtn.textContent = "+";
        plusBtn.addEventListener("click", () => updateQtdComprada(item.id, item.quantidadeComprada + 1, item.quantidade));
        expRow.append(
          h("span", { style: { fontSize: "11px", color: "#7a5820", letterSpacing: "1px" } }, "Qtd comprada:"),
          minusBtn,
          h("span", { style: { fontSize: "15px", color: "#e8d5b0", minWidth: "20px", textAlign: "center" } }, String(item.quantidadeComprada)),
          plusBtn,
          h("span", { style: { fontSize: "11px", color: "#7a5820" } }, `de ${item.quantidade}`)
        );
        card.append(expRow);
      }

      return card;
    }

    // ─── Impressão ──────────────────────────────────────────────────────────────
    function imprimirLista(tipo, items) {
      const pendentes = items.filter(i => !i.comprado);
      const lista = tipo === "prioritario"
        ? pendentes.filter(i => i.prioridade === "alta")
        : pendentes.filter(i => i.prioridade !== "alta");

      const titulo = tipo === "prioritario" ? "🔥 Itens Prioritários" : "📋 Itens Normais";

      const linhas = lista.map(i => {
        const preco = i.preco ? ` — R$ ${(i.preco * i.quantidade).toFixed(2).replace(".", ",")}` : "";
        const status = i.comprado ? "✓" : "☐";
        const orixaNome = i.orixa || "—";
        return `<tr>
          <td style="padding:10px 12px; font-size:16px; border-bottom:1px solid #eee;">${status}</td>
          <td style="padding:10px 12px; font-size:15px; border-bottom:1px solid #eee; font-weight:600;">${i.nome}</td>
          <td style="padding:10px 12px; font-size:13px; border-bottom:1px solid #eee; color:#888;">${i.categoria}</td>
          <td style="padding:10px 12px; font-size:13px; border-bottom:1px solid #eee; color:#6b4c00;">${orixaNome}</td>
          <td style="padding:10px 12px; font-size:13px; border-bottom:1px solid #eee; text-align:center;">${i.quantidadeComprada}/${i.quantidade}</td>
          <td style="padding:10px 12px; font-size:13px; border-bottom:1px solid #eee; text-align:right; color:#6b4c00;">${i.preco ? "R$ " + (i.preco * i.quantidade).toFixed(2).replace(".", ",") : "—"}</td>
        </tr>`;
      }).join("");

      const total = lista.reduce((acc, i) => i.preco ? acc + i.preco * i.quantidade : acc, 0);
      const totalHtml = total > 0 ? `<tr><td colspan="5" style="padding:12px; text-align:right; font-weight:bold; font-size:14px;">Total previsto:</td><td style="padding:12px; text-align:right; font-weight:bold; font-size:15px; color:#6b4c00;">R$ ${total.toFixed(2).replace(".", ",")}</td></tr>` : "";

      const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>
        <title>${titulo} — Lista de Feitura</title>
        <style>
          body { font-family: Georgia, serif; padding: 32px; color: #1a1000; background: #fff; }
          h1 { font-size: 24px; margin-bottom: 4px; }
          p.sub { color: #888; font-size: 13px; margin-bottom: 24px; }
          table { width: 100%; border-collapse: collapse; }
          th { text-align: left; padding: 10px 12px; background: #f5f0e8; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: #6b4c00; }
          @media print { body { padding: 16px; } }
        </style>
      </head><body>
        <h1>${titulo}</h1>
        <p class="sub">Lista de Feitura · Impresso em ${new Date().toLocaleDateString("pt-BR")} · ${lista.length} ${lista.length === 1 ? "item" : "itens"}</p>
        ${lista.length === 0 ? "<p style='color:#888;'>Nenhum item nesta categoria.</p>" : `
        <table>
          <thead><tr>
            <th style="width:36px"></th>
            <th>Item</th>
            <th>Categoria</th>
            <th>Orixá</th>
            <th style="text-align:center">Qtd</th>
            <th style="text-align:right">Valor</th>
          </tr></thead>
          <tbody>${linhas}${totalHtml}</tbody>
        </table>`}
      </body></html>`;

      const win = window.open("", "_blank");
      win.document.write(html);
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 400);
    }

    function imprimirPorOrixa(items) {
      const pendentes = items.filter(i => !i.comprado);
      if (pendentes.length === 0) { alert("Nenhum item pendente para imprimir."); return; }

      const grupos = {};
      pendentes.forEach(i => {
        const chave = i.orixa || "Sem Orixá / Geral";
        if (!grupos[chave]) grupos[chave] = [];
        grupos[chave].push(i);
      });

      const ordemOrixas = ["Oxalá","Ogum","Oxóssi","Xangô","Omolu","Iemanjá","Oxum","Iansã","Nanã","Erês","Exu","Pomba Gira","Ciganos","Malandro","Sem Orixá / Geral"];
      const chavesOrdenadas = Object.keys(grupos).sort((a, b) => {

      // Botão imprimir por Orixá
      const pbOrixa = h("button", {
        style: { padding: "7px 14px", borderRadius: "20px", border: "1px solid rgba(150,100,200,0.45)", cursor: "pointer", fontSize: "11px", fontFamily: "'Cormorant Garamond', serif", letterSpacing: "1px", background: "rgba(150,80,200,0.08)", color: "#c88ef0", transition: "all 0.2s" },
      }, "🕯️ Imprimir por Orixá");
      pbOrixa.addEventListener("click", () => imprimirPorOrixa(items));
      printRow.append(pbOrixa);

      // Lista pendentes
      const lista = h("div", { style: { display: "flex", flexDirection: "column", gap: "10px", marginBottom: "28px" } });
      if (filteredMain.length === 0) {
        const empty = h("div", { style: { textAlign: "center", padding: "44px 20px", color: "#7a5820", fontSize: "14px", letterSpacing: "1px", border: "1px dashed rgba(200,134,10,0.18)", borderRadius: "18px", fontStyle: "italic" } });
        empty.append(h("div", { style: { fontSize: "32px", marginBottom: "12px", animation: "flicker 3s infinite" } }, "🕯️"), document.createTextNode("Nenhum item aqui."), h("br"), h("span", { style: { fontSize: "12px", opacity: "0.7" } }, "Adicione itens com o botão abaixo."));
        lista.append(empty);
      } else {
        filteredMain.forEach((item, idx) => lista.append(renderItemCard(item, idx)));
      }

      // Seção comprados
      let compradosSection = null;
      if (comprados.length > 0) {
        compradosSection = h("div", { style: { marginBottom: "20px" } });
        const toggleBtn = h("button", {
          style: { width: "100%", padding: "12px 16px", background: showComprados ? "rgba(39,174,96,0.08)" : "rgba(255,255,255,0.03)", border: `1px solid ${showComprados ? "rgba(39,174,96,0.3)" : "rgba(200,134,10,0.15)"}`, borderRadius: "14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", color: "#e8d5b0", fontFamily: "'Cormorant Garamond', serif", transition: "all 0.25s" },
        });
        toggleBtn.addEventListener("click", () => setState({ showComprados: !showComprados }));
        const left = h("span", { style: { display: "flex", alignItems: "center", gap: "10px" } });
        left.append(
          h("span", { style: { fontSize: "16px" } }, "✅"),
          h("span", { style: { fontSize: "15px", letterSpacing: "1px" } }, "Itens Comprados"),
          h("span", { style: { background: "rgba(39,174,96,0.2)", color: "#27ae60", borderRadius: "20px", padding: "2px 10px", fontSize: "12px", fontWeight: "700" } }, String(comprados.length))
        );
        toggleBtn.append(left, h("span", { style: { color: "#a07840", fontSize: "18px", transition: "transform 0.3s", transform: showComprados ? "rotate(180deg)" : "none" } }, "▾"));
        compradosSection.append(toggleBtn);

        if (showComprados) {
          const compList = h("div", { style: { display: "flex", flexDirection: "column", gap: "8px", marginTop: "8px" } });
          comprados.forEach((item, idx) => compList.append(renderItemCard(item, idx, true)));
          compradosSection.append(compList);
        }
      }

      container.append(header, stats, ...(orcamento ? [orcamento] : []), filtros, orixaFilterWrap, searchWrap, ...(grupoResumo ? [grupoResumo] : []), printRow, lista, ...(compradosSection ? [compradosSection] : []));
      root.append(container);

      // Modal formulário
      if (showForm) {
        const overlay = h("div", {
          style: { position: "fixed", inset: "0", zIndex: "100", background: "rgba(0,0,0,0.75)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", justifyContent: "center" },
        });
        overlay.addEventListener("click", (e) => { if (e.target === overlay) setState({ showForm: false }); });

        const modal = h("div", { style: { width: "100%", maxWidth: "560px", background: "linear-gradient(170deg, #1a0d00 0%, #0f0900 100%)", border: "1px solid rgba(200,134,10,0.3)", borderRadius: "24px 24px 0 0", padding: "24px 20px 40px", boxShadow: "0 -12px 60px rgba(0,0,0,0.7)", animation: "slide-up 0.35s cubic-bezier(0.16,1,0.3,1)" } });

        const modalHeader = h("div", { style: { textAlign: "center", marginBottom: "22px" } });
        const drag = h("div", { style: { width: "44px", height: "4px", background: "rgba(200,134,10,0.35)", borderRadius: "2px", margin: "0 auto 16px" } });
        const titleRow = h("div", { style: { display: "flex", alignItems: "center", justifyContent: "center", gap: "10px" } });
        titleRow.append(StarSymbol(14, "#c8860a"), h("h2", { style: { margin: "0", fontSize: "18px", color: "#e8d5b0", letterSpacing: "2px", fontFamily: "'Cinzel Decorative', serif", fontWeight: "400" } }, "Novo Item"), StarSymbol(14, "#c8860a"));
        modalHeader.append(drag, titleRow);

        const inputStyle = { width: "100%", padding: "11px 14px", borderRadius: "10px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(200,134,10,0.25)", color: "#e8d5b0", fontSize: "14px", fontFamily: "'Cormorant Garamond', serif", outline: "none", boxSizing: "border-box" };
        const labelStyle = { fontSize: "10px", color: "#a07840", letterSpacing: "1.5px", display: "block", marginBottom: "5px", textTransform: "uppercase" };

        const fields = h("div", { style: { display: "flex", flexDirection: "column", gap: "14px" } });

        // Nome
        const nomeInput = h("input", { type: "text", placeholder: "Ex: Vela branca, Pemba, Ojá...", style: inputStyle, value: state.nome });
        nomeInput.addEventListener("input", e => { state.nome = e.target.value; });
        nomeInput.addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });
        setTimeout(() => { if (nomeInput.isConnected) nomeInput.focus(); }, 50);
        const nomeWrap = h("div", {}, h("label", { style: labelStyle }, "Nome do item *"), nomeInput);

        // Categoria
        const catSelect = h("select", { style: inputStyle });
        categorias.forEach(c => {
          const opt = h("option", { value: c.nome }, `${c.icone} ${c.nome}`);
          if (c.nome === state.categoria) opt.selected = true;
          catSelect.append(opt);
        });
        catSelect.addEventListener("change", e => { state.categoria = e.target.value; });
        const catWrap = h("div", {}, h("label", { style: labelStyle }, "Categoria"), catSelect);

        // Orixá / Entidade
        const orixaSelect = h("select", { style: inputStyle });
        const semOrixa = h("option", { value: "" }, "— Nenhum (opcional) —");
        orixaSelect.append(semOrixa);
        orixas.forEach(o => {
          const opt = h("option", { value: o.nome }, `${o.icone} ${o.nome}`);
          if (o.nome === state.orixa) opt.selected = true;
          orixaSelect.append(opt);
        });
        orixaSelect.addEventListener("change", e => { state.orixa = e.target.value; });
        const orixaWrap = h("div", {}, h("label", { style: labelStyle }, "Orixá / Entidade"), orixaSelect);

        // Qtd + Preço
        const grid = h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" } });
        const qtdInput = h("input", { type: "number", min: "1", style: inputStyle, value: String(state.quantidade) });
        qtdInput.addEventListener("input", e => { state.quantidade = e.target.value; });
        const precoInput = h("input", { type: "text", placeholder: "0,00", style: inputStyle, value: state.preco });
        precoInput.addEventListener("input", e => { state.preco = e.target.value; });
        grid.append(
          h("div", {}, h("label", { style: labelStyle }, "Quantidade"), qtdInput),
          h("div", {}, h("label", { style: labelStyle }, "Preço unit. (R$)"), precoInput)
        );

        // Prioridade
        const prioRow = h("div", { style: { display: "flex", gap: "10px" } });
        [
          { value: "normal", label: "Normal", sub: "Pode aguardar", color: "#c8860a" },
          { value: "alta", label: "🔥 Alta", sub: "Comprar logo", color: "#c0392b" },
        ].forEach(p => {
          const btn = h("button", {
            style: { flex: "1", padding: "11px 10px", borderRadius: "12px", cursor: "pointer", border: state.prioridade === p.value ? `2px solid ${p.color}` : "1px solid rgba(255,255,255,0.08)", background: state.prioridade === p.value ? `rgba(${p.value === "alta" ? "192,57,43" : "200,134,10"},0.15)` : "rgba(255,255,255,0.03)", color: "#e8d5b0", fontFamily: "'Cormorant Garamond', serif", transition: "all 0.2s" },
          });
          btn.addEventListener("click", () => setState({ prioridade: p.value }));
          btn.append(h("div", { style: { fontSize: "14px", fontWeight: "700" } }, p.label), h("div", { style: { fontSize: "10px", color: "#7a5820", marginTop: "2px" } }, p.sub));
          prioRow.append(btn);
        });

        const addBtn = h("button", {
          style: { padding: "14px", borderRadius: "14px", border: "none", cursor: "pointer", background: "linear-gradient(135deg, #c8860a, #f0c040)", color: "#1a0a00", fontSize: "15px", fontWeight: "700", fontFamily: "'Cinzel Decorative', serif", letterSpacing: "2px", marginTop: "4px", boxShadow: "0 4px 20px rgba(200,134,10,0.35)", animation: "pulse-glow 2s ease infinite", width: "100%" },
        }, "✦ Adicionar à Lista ✦");
        addBtn.addEventListener("click", addItem);

        fields.append(nomeWrap, catWrap, orixaWrap, grid, h("div", {}, h("label", { style: labelStyle }, "Prioridade"), prioRow), addBtn);
        modal.append(modalHeader, fields);
        overlay.append(modal);
        root.append(overlay);
      }

      // FAB
      const fab = h("button", {
        style: { position: "fixed", bottom: "30px", right: "50%", transform: "translateX(50%)", padding: "14px 32px", borderRadius: "40px", border: "none", cursor: "pointer", background: "linear-gradient(135deg, #a06010, #c8860a, #f0c040, #c8860a)", backgroundSize: "300% auto", color: "#1a0a00", fontSize: "14px", fontWeight: "700", fontFamily: "'Cinzel Decorative', serif", letterSpacing: "2px", boxShadow: "0 4px 24px rgba(200,134,10,0.5), 0 0 0 1px rgba(200,134,10,0.2)", zIndex: "50", animation: "shimmer 3s linear infinite, pulse-glow 2s ease infinite", whiteSpace: "nowrap" },
      }, "✦ Adicionar Item");
      fab.addEventListener("click", () => setState({ showForm: true }));

      root.append(fab);
      app.append(root);
    }

    // ─── Init ────────────────────────────────────────────────────────────────────
    render();
    startListener();
  </script>
</body>
</html>
